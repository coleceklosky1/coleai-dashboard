name: Daily Briefings

on:
  schedule:
    - cron: '0 9 * * *'   # 9:00 AM UTC = 5:00 AM EDT
  workflow_dispatch:        # allows manual trigger from GitHub

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  update-briefings:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install google-genai

      - name: Generate briefings
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: python briefings_update.py

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add daily_briefings.js briefings_history.json
          git diff --staged --quiet || git commit -m "Daily briefings $(date +%Y-%m-%d)"
          git push
